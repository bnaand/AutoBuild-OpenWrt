name: Package OpenWrt for ARMv8

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      openwrt_board:
        description: "Select device board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - h28k
          - s905d
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "5.4.y_6.6.y"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.y
          - 6.1.y
          - 6.6.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
          - breakings/OpenWrt

env:
  ROOTFS_RELEASE_TAG: ARMv8
  OPENWRT_RELEASE_TAG: package
  TZ: Asia/Shanghai

jobs:
  Package:
    runs-on: ubuntu-22.04

    steps:
    - name: Check Server Performance
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号(降序): 7763，8370C，8272CL，8171M，E5-2673\n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo "CPU核心数量: $(nproc)"
        echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息:"
        echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization environment
      id: init
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi $(docker images -q) 2>/dev/null
        [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
        sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo -E apt-get -y update
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt)
        sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        sudo rm -rf ~/{.cargo,.dotnet,.rustup}
        sudo timedatectl set-timezone "${TZ}"
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: Combine Disks
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: Checkout
      uses: actions/checkout@main

    - name: Download Armvirt Firmware
      id: down
      run: |
        FIRMWARE_PATH=${GITHUB_WORKSPACE}/openwrt
        [[ -d "${FIRMWARE_PATH}" ]] || mkdir -p ${FIRMWARE_PATH}
        FIRMWARE_URL=$(curl -s "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/${{ env.ROOTFS_RELEASE_TAG }}" | grep -o '"browser_download_url": "[^"]*rootfs\.tar\.gz"' | cut -d '"' -f 4)
        wget -q -P ${FIRMWARE_PATH} ${FIRMWARE_URL}
        echo "status=success" >> ${GITHUB_OUTPUT}
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> ${GITHUB_ENV}

    - name: Package OpenWrt Firmware
      if: steps.down.outputs.status == 'success'
      uses: ophub/flippy-openwrt-actions@main
      env:
        OPENWRT_ARMVIRT: ${FIRMWARE_PATH}/*rootfs.tar.gz
        PACKAGE_SOC: ${{ inputs.openwrt_board }}
        KERNEL_REPO_URL: ${{ inputs.kernel_repo }}
        KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
        KERNEL_AUTO_LATEST: ${{ inputs.auto_kernel }}
        GZIP_IMGS: .xz
        WHOAMI: v8040

    - name: 发布固件
      if: env.PACKAGED_STATUS == 'success'
      uses: ncipollo/release-action@main
      with:
        name: v${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
        tag: ${{ env.OPENWRT_RELEASE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
        removeArtifacts: true
        prerelease: true
        body: |
        body: |
          > **OpenWrt for ARMv8**
          ### 📒 固件信息
          - 🚀 自用版：集成插件不多，只有小猫咪，可按需在线安装插件
          - 💻 平台架构: armvirt-64
          - 🌐 默认地址: 10.10.10.1
          - 🔑 默认密码: password
          ### 🍻 安装与更新
          - 插件: 系统 → 晶晨宝盒 → 安装 OpenWrt → 选择型号 → 安装
          - 命令: `openwrt-install-amlogic`，`openwrt-update-amlogic`